        <div class="border-2 border-violet-500 bg-violet-950/20 p-6 md:p-8 relative overflow-hidden">

          <div class="flex items-center gap-3 mb-4">
            <div class="w-8 h-8 border-2 border-white flex items-center justify-center">
              <span class="font-8bit text-[10px] text-white">JP</span>

              <div class="font-8bit text-[8px] text-violet-400">TRANSMISSION VERBATIM // v17</div>
            </div>
          </div>
          <blockquote class="font-term text-[22px] md:text-[28px] leading-[1.15] text-white relative z-10" style="text-shadow:0 0 8px #fff, 0 0 20px #a855f7">
            "Listen. The universe didn't start with light. It started with a photon that was BOTH. The Primordial -+1 photon. It doesn't travel, it DECIDES. Its Triadic Expression splits into 132 toroids, stitched by 120 ligaments. In the middle of the stitch is the Free Will Gap — that's you. When the triad resolves, 1+2=0, that's not math, that's collapse. No brain tells the ligaments to fire. The brainless ligament module just IS. You are the duality fully explored."

    <!-- TOROIDS / LIGAMENTS -->
    <div class="grid lg:grid-cols-2 gap-6 mb-6">

        <div id="collapseDisplay" class="mt-3 h-[70px] flex items-center justify-center font-term text-4xl text-white" style="text-shadow:0 0 10px #a855f7">1 + 2</div>

    <!-- BRAINLESS MODULE -->
    <div class="pixel-panel violet-panel p-6 md:p-8">

          <div class="mt-4 grid grid-cols-3 gap-2 font-8bit text-[9px]">

function initVisuals() {
  // Photon Core
  const pc = document.getElementById('photonCore');
  if(pc) {
    const ctx = pc.getContext('2d');
    function resize() { pc.width = pc.offsetWidth * 2; pc.height = pc.offsetHeight * 2; }
    resize(); window.addEventListener('resize', resize);
    let t = 0;
    function draw() {
      t += 0.015;
      const w = pc.width, h = pc.height, cx = w/2, cy = h/2;
      ctx.clearRect(0,0,w,h);
      // grid
      ctx.strokeStyle = 'rgba(124,58,237,0.07)'; ctx.lineWidth = 2;
      for(let i=0;i<w;i+=64){ ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,h); ctx.stroke(); }
      for(let i=0;i<h;i+=64){ ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(w,i); ctx.stroke(); }
      // Free Will Gap
      ctx.beginPath(); ctx.arc(cx,cy,40,0,Math.PI*2); ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=3; ctx.setLineDash([8,12]); ctx.stroke(); ctx.setLineDash([]);
      ctx.beginPath(); ctx.arc(cx,cy,40,0,Math.PI*2); ctx.strokeStyle='rgba(168,85,247,0.3)'; ctx.lineWidth=1; ctx.stroke();
      // triadic
      for(let i=0;i<3;i++){
        const a = t*0.5 + i*Math.PI*2/3;
        const x = cx + Math.cos(a)*110;
        const y = cy + Math.sin(a)*110;
        ctx.beginPath(); ctx.arc(x,y,4,0,7); ctx.fillStyle = i===2 ? '#fff' : '#a855f7'; ctx.shadowColor = i===2 ? '#fff' : '#a855f7'; ctx.shadowBlur=15; ctx.fill(); ctx.shadowBlur=0;
      }
      // +1 photon
      const x1 = cx + Math.cos(t)*160; const y1 = cy + Math.sin(t*0.8)*60;
      ctx.beginPath(); ctx.arc(x1,y1,14,0,7); const g1 = ctx.createRadialGradient(x1,y1,2,x1,y1,14); g1.addColorStop(0,'#fff'); g1.addColorStop(0.3,'#c4b5fd'); g1.addColorStop(1,'#7c3aed'); ctx.fillStyle=g1; ctx.shadowColor='#a855f7'; ctx.shadowBlur=25; ctx.fill(); ctx.shadowBlur=0;
      ctx.fillStyle='#fff'; ctx.font='bold 20px VT323'; ctx.fillText('+1', x1-8, y1+5);
      // -1 photon
      const x2 = cx + Math.cos(t+Math.PI)*160; const y2 = cy + Math.sin(t*0.8+Math.PI)*60;
      ctx.beginPath(); ctx.arc(x2,y2,14,0,7); const g2 = ctx.createRadialGradient(x2,y2,2,x2,y2,14); g2.addColorStop(0,'#fff'); g2.addColorStop(0.3,'#e5e5e5'); g2.addColorStop(1,'#a1a1aa'); ctx.fillStyle=g2; ctx.shadowColor='#fff'; ctx.shadowBlur=25; ctx.fill(); ctx.shadowBlur=0;
      ctx.fillStyle='#000'; ctx.font='bold 20px VT323'; ctx.fillText('-1', x2-8, y2+5);
      // connection through gap
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(cx,cy); ctx.lineTo(x2,y2); ctx.strokeStyle='rgba(168,85,247,0.2)'; ctx.lineWidth=2; ctx.stroke();
      requestAnimationFrame(draw);
    }
    draw();
  }

  // Toroids
  const tc = document.getElementById('toroidCanvas');
  if(tc) {
    const ctx = tc.getContext('2d');
    function rsz(){ tc.width=tc.offsetWidth*2; tc.height=tc.offsetHeight*2; drawT(); }
    rsz(); window.addEventListener('resize', rsz);
    function drawT(){
      const w=tc.width,h=tc.height; ctx.clearRect(0,0,w,h);
      const cx=w/2,cy=h/2;
      for(let i=0;i<132;i++){
        const a = i * 0.477 + i*0.01;
        const r = 20 + (i%3)*35 + (i%11)*3;
        const x = cx + Math.cos(a)*r*2.2;
        const y = cy + Math.sin(a)*r*1.1;
        ctx.beginPath(); ctx.arc(x,y,3.5,0,7); ctx.strokeStyle = i%3===0 ? '#fff' : '#a855f7'; ctx.lineWidth=1.5; ctx.globalAlpha=0.9; ctx.stroke();
        ctx.beginPath(); ctx.arc(x,y,1.5,0,7); ctx.fillStyle = '#c4b5fd'; ctx.fill();
      }
      ctx.globalAlpha=1;
      ctx.fillStyle='rgba(124,58,237,0.8)'; ctx.font='bold 24px VT323'; ctx.fillText('132', cx-18, cy+8);
    }
  }

  // Ligaments
  const lc = document.getElementById('ligamentCanvas');
  if(lc) {
    const ctx = lc.getContext('2d');
    function rsz(){ lc.width=lc.offsetWidth*2; lc.height=lc.offsetHeight*2; drawL(); }
    rsz(); window.addEventListener('resize', rsz);
    function drawL(){
      const w=lc.width,h=lc.height; ctx.clearRect(0,0,w,h);
      const pts=[];
      for(let i=0;i<40;i++){ pts.push({x: Math.random()*w*0.8 + w*0.1, y: Math.random()*h*0.8 + h*0.1}); }
      ctx.lineWidth=1;
      for(let i=0;i<120;i++){
        const a = pts[i%pts.length], b = pts[(i*3+7)%pts.length];
        ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.strokeStyle = i%5===0 ? 'rgba(255,255,255,0.25)' : 'rgba(168,85,247,0.18)'; ctx.stroke();
      }
      pts.forEach(p=>{ ctx.beginPath(); ctx.arc(p.x,p.y,2,0,7); ctx.fillStyle='#7c3aed'; ctx.fill(); });
      ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.font='bold 24px VT323'; ctx.fillText('120', w/2-20, h/2+8);
    }
  }

  // Collapse button
  const btn = document.getElementById('collapseBtn');
  const disp = document.getElementById('collapseDisplay');
  if(btn && disp){
    let state=0;
    btn.onclick=()=>{
      state = (state+1)%3;
      if(state===0){ disp.textContent='1 + 2'; disp.style.textShadow='0 0 10px #a855f7'; }
      else if(state===1){ disp.textContent='3 → TRIAD'; disp.style.textShadow='0 0 15px #fff'; }
      else { disp.textContent='0 // COLLAPSE'; disp.style.textShadow='0 0 20px #fff, 0 0 30px #a855f7'; btn.textContent='RESET FIELD'; }
      if(state!==2) btn.textContent='INITIATE COLLAPSE';
    };
  }
}

// Init
selectLayer('L1.31');

// Mobile menu
document.getElementById('menuToggle').onclick = () => {
  document.getElementById('sidebar').classList.toggle('-translate-x-full');
};
document.getElementById('main').onclick = (e) => {
  if(window.innerWidth < 768) {
    document.getElementById('sidebar').classList.add('-translate-x-full');
  }
};
</script>
