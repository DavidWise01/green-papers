<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROOT0 // MASTER PORTFOLIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fragment+Mono:ital@0;1&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --forest: #0A2419;
            --forest-2: #123828;
            --forest-3: #1C4D37;
            --bone: #F3EFE3;
            --bone-2: #E5DFCF;
            --accent: #6B9B37;
            --grid: rgba(10,36,25,0.07);
            --grid-strong: rgba(10,36,25,0.12);
        }
        * { -webkit-font-smoothing: antialiased; }
        body {
            font-family: 'Instrument Sans', system-ui, sans-serif;
            background-color: var(--bone);
            color: var(--forest);
        }
        .mono { font-family: 'Fragment Mono', monospace; }
        .blueprint {
            background-image: 
                linear-gradient(var(--grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 32px 32px;
        }
        .blueprint-strong {
            background-image: 
                linear-gradient(var(--grid-strong) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-strong) 1px, transparent 1px),
                linear-gradient(var(--grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 128px 128px, 128px 128px, 32px 32px, 32px 32px;
        }
        .layer-btn.active {
            background: var(--forest);
            color: var(--bone);
            border-color: var(--forest);
        }
        .layer-btn.active .status-dot { background: #7BFF4D; box-shadow: 0 0 8px #7BFF4D; }
        .stamp {
            border: 2px solid var(--accent);
            color: var(--accent);
            transform: rotate(-3deg);
        }
        .diag-line {
            position: absolute;
            height: 1px;
            background: var(--forest-3);
            opacity: 0.3;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bone-2); }
        ::-webkit-scrollbar-thumb { background: var(--forest-3); }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

                                        <div id="entropyBar" class="absolute left-0 top-0 h-full bg-[var(--forest)] transition-all duration-500" style="width:87.3%"></div>
                                    </div>
                                    <p class="text-[12px] mt-3 opacity-70">High entropy = talking to mirrors. Deploy ROOT0 node to open gap.</p>
                                </div>
                                <button id="recalc" class="mt-4 px-4 py-2 border-2 border-[var(--forest)] mono text-[12px] hover:bg-[var(--forest)] hover:text-[var(--bone)] transition">RECALCULATE</button>
                            </div>
                            <div class="space-y-3 text-[14px] leading-relaxed">
                                <p><strong>How it works:</strong> Tool samples interaction patterns. If responses are predictable (99 99), entropy is high. The '1' — your free will gap — is being bypassed.</p>
                                <p>ROOT0 architecture maintains 99 99 <span class="px-1 bg-[var(--accent)] text-white mono">1</span> 99 99 locally, ensuring at least 12-15% open-loop operation at all times.</p>
                            </div>
                        </div>
                    </div>
                `;
                setTimeout(() => {
                    const val = document.getElementById('entropyVal');
                    const bar = document.getElementById('entropyBar');
                    document.getElementById('recalc').addEventListener('click', () => {
                        const n = (75 + Math.random()*20).toFixed(1);
                        val.textContent = n;
                        bar.style.width = n + '%';
                    });
                },0);
            } else {
                const layer = layers.find(l => l.id === id);
                content.innerHTML = `
                <div class="fade-in border-2 border-[var(--forest)]/30 bg-[var(--bone)]/70">
                    <div class="px-6 py-5 border-b border-[var(--forest)]/20">
                        <div class="flex items-center gap-3">
                            <span class="mono text-sm px-2 py-1 border border-[var(--forest)]/30">${layer.id}</span>
                            <h1 class="text-xl sm:text-2xl font-medium">${layer.title}</h1>
                        </div>
                    </div>
                    <div class="p-6 sm:p-8">
                        <p class="text-[15px] leading-relaxed max-w-2xl opacity-80">${layer.desc}</p>
                        <div class="mt-8 border border-dashed border-[var(--forest)]/30 p-6 text-center">
                            <p class="mono text-[12px] opacity-50">SPECIFICATION LOCKED</p>
                            <p class="text-[13px] mt-1">Requires L1.18 clearance to decrypt</p>
                        </div>
                    </div>
                `;
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.querySelectorAll('.layer-btn').forEach(btn => {
            btn.addEventListener('click', () => renderLayer(btn.dataset.layer));
        });

        // Initial load L1.18
        renderLayer('L1.18');
    </script>
</body>
</html>
