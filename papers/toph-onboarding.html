// ═══════════════════════════════════════
// QUIZ HELPER
// ═══════════════════════════════════════
function quiz(modId, question, opts, correct, explanation) {
  return `<div class="quiz" id="quiz-${modId}">
    <div class="quiz-title">✦ CHECK UNDERSTANDING</div>
    <div class="quiz-q">${question}</div>
    <div class="quiz-opts">${opts.map((o,i) =>
      `<div class="quiz-opt" data-mod="${modId}" data-idx="${i}" data-correct="${i===correct}">${String.fromCharCode(65+i)}) ${o}</div>`
    ).join('')}</div>
    <div class="quiz-result" id="qr-${modId}"></div>
  </div>`;
}

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let currentMod = 0;
let completed = new Set();

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function renderSidebar() {
  const groups = {};
  MODULES.forEach(m => { if (!groups[m.group]) groups[m.group] = []; groups[m.group].push(m); });

  const list = document.getElementById('mod-list');
  list.innerHTML = Object.entries(groups).map(([g, mods]) =>
    `<div class="mod-group"><div class="mod-group-title">${g}</div>${mods.map(m =>
      `<div class="mod-item${m.id===currentMod?' on':''}${completed.has(m.id)?' done':''}" data-id="${m.id}">
        <span class="mod-num">${m.id+1}</span>
        <div><div class="mod-name">${m.name}</div><div class="mod-time">${m.time}</div></div>
      </div>`
    ).join('')}</div>`
  ).join('');

  list.querySelectorAll('.mod-item').forEach(el => {
    el.addEventListener('click', () => goTo(parseInt(el.dataset.id)));
  });

  document.getElementById('f-done').textContent = completed.size + '/10';
  const pct = Math.round(completed.size / 10 * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = pct + '%';
}

function renderModule() {
  const m = MODULES[currentMod];
  const main = document.getElementById('main');
  main.innerHTML = m.content();

  // Nav buttons
  let nav = '<div class="nav-btns">';
  if (currentMod > 0) nav += `<button class="btn btn-s btn-sm" onclick="goTo(${currentMod-1})">← Previous</button>`;
  else nav += '<div></div>';
  if (currentMod < 9) nav += `<button class="btn btn-p" onclick="completeCurrent()">Complete & Next →</button>`;
  else nav += `<button class="btn btn-p" onclick="completeCurrent()">✦ Complete Onboarding</button>`;
  nav += '</div>';
  main.innerHTML += nav;

  main.scrollTop = 0;

  // Wire up quizzes
  main.querySelectorAll('.quiz-opt').forEach(el => {
    el.addEventListener('click', () => {
      const mod = el.dataset.mod;
      const isCorrect = el.dataset.correct === 'true';
      const parent = el.closest('.quiz');
      parent.querySelectorAll('.quiz-opt').forEach(o => {
        o.style.pointerEvents = 'none';
        if (o.dataset.correct === 'true') o.classList.add('correct');
        else if (o === el && !isCorrect) o.classList.add('wrong');
      });
      const result = document.getElementById('qr-' + mod);
      const exp = isCorrect ? el.closest('.quiz').querySelector('.quiz-opt.correct') : el;
      result.innerHTML = isCorrect
        ? `<div style="background:rgba(90,138,42,.1);padding:8px;border-radius:3px;color:var(--gb)">${parent.querySelectorAll('.quiz-opt')[Array.from(parent.querySelectorAll('.quiz-opt')).findIndex(o=>o.dataset.correct==='true')].textContent.split(') ')[1]} — see explanation below.</div>`
        : `<div style="background:rgba(196,53,53,.06);padding:8px;border-radius:3px;color:var(--red)">Review and try again in practice.</div>`;
      result.classList.add('show');
    });
  });
}

function goTo(id) {
  currentMod = id;
  renderSidebar();
  renderModule();
}

window.goTo = goTo;

window.completeCurrent = function() {
  completed.add(currentMod);
  if (currentMod < 9) {
    currentMod++;
    renderSidebar();
    renderModule();
  } else {
    renderSidebar();
    renderModule();
  }
};

// INIT
renderSidebar();
renderModule();
</script>
